<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מד טיקטוק - סטטיסטיקות</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .page-title {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .page-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .page-subtitle a {
            color: #ff0050;
            text-decoration: none;
            font-weight: bold;
        }
        .page-subtitle a:hover {
            text-decoration: underline;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .gauge-followers {
            border-top: 4px solid #9c27b0;
        }
        .gauge-followers .gauge-header {
            background: linear-gradient(135deg, #9c27b0, #e040fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gauge-followers .gauge-number {
            color: #7b1fa2;
        }
        .gauge-followers .bar-container {
            background-color: #f3e5f5;
        }
        .gauge-followers .progress-bar {
            background: linear-gradient(90deg, #9c27b0, #e040fb, #9c27b0);
            background-size: 200% 100%;
            animation: shine 2s infinite;
        }
        .gauge-followers .gauge-icon {
            background: linear-gradient(135deg, #9c27b0, #e040fb);
        }
        .gauge-likes {
            border-top: 4px solid #2196f3;
        }
        .gauge-likes .gauge-header {
            background: linear-gradient(135deg, #1976d2, #42a5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gauge-likes .gauge-number {
            color: #1565c0;
        }
        .gauge-likes .bar-container {
            background-color: #e3f2fd;
        }
        .gauge-likes .progress-bar {
            background: linear-gradient(90deg, #1976d2, #42a5f5, #1976d2);
            background-size: 200% 100%;
            animation: shine 2s infinite;
        }
        .gauge-likes .gauge-icon {
            background: linear-gradient(135deg, #1976d2, #42a5f5);
        }
        .gauge-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .gauge-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
        }
        .gauge-header {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }
        .gauge-number {
            font-size: 48px;
            font-weight: 800;
            margin: 4px 0;
            line-height: 1.1;
            text-align: center;
        }
        .gauge-desc {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin: 8px 0 16px 0;
        }
        .bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 50px;
            overflow: hidden;
            height: 18px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            border-radius: 50px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        .tiktok-link-card {
            background: linear-gradient(135deg, #010101 0%, #1a1a2e 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,0,80,0.3);
        }
        .tiktok-link-card a {
            color: #ff0050;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .tiktok-link-card a:hover {
            text-decoration: underline;
        }
        .tiktok-link-card .tiktok-label {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-bottom: 6px;
        }
        .owner-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 3px solid #ff9800;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        .control-group {
            margin: 16px 0;
        }
        .control-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .control-row .control-group {
            flex: 1;
        }
        .section-label {
            font-size: 14px;
            font-weight: bold;
            color: #7b1fa2;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-label.likes-label {
            color: #1565c0;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
        }
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff9800;
        }
        button {
            background: linear-gradient(90deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 25px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255,152,0,0.4);
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255,152,0,0.6);
        }
        .mode-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .owner-mode {
            background: #ff9800;
            color: white;
        }
        .viewer-mode {
            background: #2196f3;
            color: white;
        }
        .link-box {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 12px;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        @keyframes shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gauge-number {
            animation: countUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-title">🎵 מד טיקטוק - סטטיסטיקות</div>
        <div class="page-subtitle">
            מעקב אחרי <a href="https://www.tiktok.com/@dsmobil.psmstrisrael" target="_blank" rel="noopener">@dsmobil.psmstrisrael</a>
        </div>

        <div id="modeBadge"></div>

        <!-- Followers Gauge -->
        <div class="card gauge-followers" id="followersCard">
            <div class="gauge-top">
                <div class="gauge-icon">👥</div>
                <h3 class="gauge-header">עוקבים</h3>
            </div>
            <div class="gauge-number" id="followersNumber">0</div>
            <div class="gauge-desc" id="followersDesc">טוען...</div>
            <div class="bar-container">
                <div class="progress-bar" id="followersBar"></div>
            </div>
            <div class="bar-label">
                <span>0</span>
                <span id="followersMilestone">יעד: 10,000</span>
            </div>
        </div>

        <!-- Likes Gauge -->
        <div class="card gauge-likes" id="likesCard">
            <div class="gauge-top">
                <div class="gauge-icon">❤️</div>
                <h3 class="gauge-header">לייקים</h3>
            </div>
            <div class="gauge-number" id="likesNumber">0</div>
            <div class="gauge-desc" id="likesDesc">טוען...</div>
            <div class="bar-container">
                <div class="progress-bar" id="likesBar"></div>
            </div>
            <div class="bar-label">
                <span>0</span>
                <span id="likesMilestone">יעד: 100,000</span>
            </div>
        </div>

        <!-- TikTok Profile Link -->
        <div class="tiktok-link-card">
            <div class="tiktok-label">פרופיל טיקטוק</div>
            <a href="https://www.tiktok.com/@dsmobil.psmstrisrael" target="_blank" rel="noopener">
                🎵 @dsmobil.psmstrisrael
            </a>
        </div>

        <div id="statusMessage"></div>

        <!-- Owner Panel -->
        <div class="card owner-card" id="ownerPanel" style="display: none;">
            <h2>🔐 פאנל שליטה - בעלים</h2>

            <div class="section-label">👥 עוקבים</div>
            <div class="control-row">
                <div class="control-group">
                    <label>מספר עוקבים:</label>
                    <input type="number" id="followersCountInput" min="0" value="0">
                </div>
                <div class="control-group">
                    <label>תיאור:</label>
                    <input type="text" id="followersTextInput" placeholder="תיאור עוקבים">
                </div>
            </div>

            <div class="section-label likes-label">❤️ לייקים</div>
            <div class="control-row">
                <div class="control-group">
                    <label>מספר לייקים:</label>
                    <input type="number" id="likesCountInput" min="0" value="0">
                </div>
                <div class="control-group">
                    <label>תיאור:</label>
                    <input type="text" id="likesTextInput" placeholder="תיאור לייקים">
                </div>
            </div>

            <button id="updateBtn">🚀 עדכן סטטיסטיקות</button>

            <div class="link-box">
                <strong>🔗 קישור לצופים:</strong><br>
                <span id="viewerLink"></span>
                <button id="copyLinkBtn" style="margin-top: 5px; background: #2196f3; box-shadow: none;">📋 העתק קישור</button>
            </div>
            <div class="link-box">
                <strong>👑 הקישור שלך (בעלים):</strong><br>
                <span id="ownerLink"></span>
                <small style="display: block; margin-top: 5px;">*שמור את הקישור הזה - רק מי שפותח אותו יכול לנהל</small>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCktwUnVUswLw5ojZH53QEHUOkXbVlmbv0",
            authDomain: "tiktok-bar-26335.firebaseapp.com",
            databaseURL: "https://tiktok-bar-26335-default-rtdb.firebaseio.com",
            projectId: "tiktok-bar-26335",
            storageBucket: "tiktok-bar-26335.firebasestorage.app",
            messagingSenderId: "418257627680",
            appId: "1:418257627680:web:4fbf9a1fd841a14e7eea45",
            measurementId: "G-2549WJGSTH"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const barRef = ref(db, 'barData');

        const FOLLOWERS_MILESTONE = 10000;
        const LIKES_MILESTONE = 100000;

        const urlParams = new URLSearchParams(window.location.search);
        const isOwner = urlParams.get('owner') === 'true';

        const ownerPanel = document.getElementById('ownerPanel');
        const modeBadge = document.getElementById('modeBadge');
        const statusMessage = document.getElementById('statusMessage');
        const followersNumber = document.getElementById('followersNumber');
        const followersDesc = document.getElementById('followersDesc');
        const followersBar = document.getElementById('followersBar');
        const followersMilestone = document.getElementById('followersMilestone');
        const likesNumber = document.getElementById('likesNumber');
        const likesDesc = document.getElementById('likesDesc');
        const likesBar = document.getElementById('likesBar');
        const likesMilestone = document.getElementById('likesMilestone');
        const followersCountInput = document.getElementById('followersCountInput');
        const followersTextInput = document.getElementById('followersTextInput');
        const likesCountInput = document.getElementById('likesCountInput');
        const likesTextInput = document.getElementById('likesTextInput');
        const updateBtn = document.getElementById('updateBtn');
        const copyLinkBtn = document.getElementById('copyLinkBtn');

        const currentUrl = window.location.href.split('?')[0];
        const viewerUrl = currentUrl;
        const ownerUrl = currentUrl + '?owner=true';

        const viewerLinkSpan = document.getElementById('viewerLink');
        const ownerLinkSpan = document.getElementById('ownerLink');
        if (viewerLinkSpan) viewerLinkSpan.textContent = viewerUrl;
        if (ownerLinkSpan) ownerLinkSpan.textContent = ownerUrl;

        followersMilestone.textContent = 'יעד: ' + FOLLOWERS_MILESTONE.toLocaleString();
        likesMilestone.textContent = 'יעד: ' + LIKES_MILESTONE.toLocaleString();

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function updateDisplay(data) {
            const fc = data.followersCount || 0;
            const ft = data.followersText || '';
            const lc = data.likesCount || 0;
            const lt = data.likesText || '';

            // Followers
            followersNumber.textContent = formatNumber(fc);
            followersDesc.textContent = ft || 'עוקבים בטיקטוק';
            const followersPct = Math.min(100, (fc / FOLLOWERS_MILESTONE) * 100);
            followersBar.style.width = followersPct + '%';

            // Likes
            likesNumber.textContent = formatNumber(lc);
            likesDesc.textContent = lt || 'לייקים בטיקטוק';
            const likesPct = Math.min(100, (lc / LIKES_MILESTONE) * 100);
            likesBar.style.width = likesPct + '%';
        }

        function showStatus(msg, type) {
            statusMessage.innerHTML = `<div class="status status-${type === 'success' ? 'success' : 'error'}">${msg}</div>`;
            setTimeout(() => {
                if (statusMessage.innerHTML.includes(msg)) {
                    statusMessage.innerHTML = '';
                }
            }, 3000);
        }

        if (isOwner) {
            modeBadge.innerHTML = '<span class="mode-badge owner-mode">👑 מצב בעלים - יש לך שליטה מלאה</span>';
            ownerPanel.style.display = 'block';

            let initialLoadDone = false;

            onValue(barRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updateDisplay(data);
                    if (!initialLoadDone) {
                        followersCountInput.value = data.followersCount || 0;
                        followersTextInput.value = data.followersText || '';
                        likesCountInput.value = data.likesCount || 0;
                        likesTextInput.value = data.likesText || '';
                        initialLoadDone = true;
                    }
                } else {
                    // Show defaults in UI only — do NOT write to Firebase
                    const defaults = {
                        followersCount: 0,
                        followersText: 'עוקבים בטיקטוק',
                        likesCount: 0,
                        likesText: 'לייקים בטיקטוק'
                    };
                    updateDisplay(defaults);
                    if (!initialLoadDone) {
                        followersCountInput.value = 0;
                        followersTextInput.value = '';
                        likesCountInput.value = 0;
                        likesTextInput.value = '';
                        initialLoadDone = true;
                    }
                }
            });

            updateBtn.addEventListener('click', () => {
                let fc = parseInt(followersCountInput.value);
                let lc = parseInt(likesCountInput.value);
                if (isNaN(fc)) fc = 0;
                if (isNaN(lc)) lc = 0;
                fc = Math.max(0, fc);
                lc = Math.max(0, lc);
                const ft = followersTextInput.value || '';
                const lt = likesTextInput.value || '';

                set(barRef, {
                    followersCount: fc,
                    followersText: ft,
                    likesCount: lc,
                    likesText: lt
                })
                .then(() => {
                    showStatus('✅ הסטטיסטיקות עודכנו בהצלחה! כל הצופים רואים את השינוי', 'success');
                })
                .catch((error) => {
                    showStatus('❌ שגיאה בעדכון: ' + error.message, 'error');
                });
            });
        } else {
            modeBadge.innerHTML = '<span class="mode-badge viewer-mode">👁️ מצב צופה - צופה בסטטיסטיקות המעודכנות</span>';

            onValue(barRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updateDisplay(data);
                    showStatus('🔄 התקבל עדכון חדש!', 'success');
                    setTimeout(() => {
                        const statusDiv = document.getElementById('statusMessage');
                        if (statusDiv) statusDiv.innerHTML = '';
                    }, 2000);
                } else {
                    updateDisplay({
                        followersCount: 0,
                        followersText: 'ממתין לנתונים...',
                        likesCount: 0,
                        likesText: 'ממתין לנתונים...'
                    });
                }
            });
        }

        if (copyLinkBtn) {
            copyLinkBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(viewerUrl);
                alert('📋 הקישור הועתק! שלח אותו לכל מי שרוצה לראות את הסטטיסטיקות');
            });
        }

        if (!isOwner) {
            setTimeout(() => {
                showStatus('💡 ממתין לעדכונים מהבעלים...', 'success');
            }, 1000);
        }
    </script>
</body>
</html>
